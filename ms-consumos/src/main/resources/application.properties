# ms-consumos · application.properties | Puerto: 8087 | BD: db_hotel_consumos

# spring.application.name: nombre del microservicio de consumos en el sistema distribuido
spring.application.name=ms-consumos
# server.port: puerto HTTP exclusivo del microservicio de consumos de servicios
server.port=8087
# spring.datasource.url: URL de conexión JDBC a la base de datos de consumos por reserva
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_consumos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username: usuario MySQL con acceso a db_hotel_consumos
spring.datasource.username=root
# spring.datasource.password: contraseña MySQL vacía por defecto en entorno local
spring.datasource.password=
# spring.datasource.driver-class-name: clase driver JDBC de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto: Hibernate crea/actualiza tablas al iniciar
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql: habilita impresión de SQL en consola
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql: mejora la presentación del SQL
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect: dialecto MySQL para Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


// Configuración de SpringDoc para generar documentación OpenAPI y habilitar Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ── EUREKA CLIENT ─────────────────────────────────────────────
# Registra este microservicio en el servidor Eureka del hotel (puerto 8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
