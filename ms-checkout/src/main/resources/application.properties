# ms-checkout · application.properties | Puerto: 8085 | BD: db_hotel_checkout

# spring.application.name: identifica el microservicio de check-out en el ecosistema
spring.application.name=ms-checkout
# server.port: puerto HTTP donde Tomcat atiende solicitudes del proceso de check-out
server.port=8085
# spring.datasource.url: conexión JDBC a la base de datos exclusiva del proceso de check-out
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_checkout?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username: usuario MySQL con permisos sobre db_hotel_checkout
spring.datasource.username=root
# spring.datasource.password: contraseña del usuario de base de datos
spring.datasource.password=
# spring.datasource.driver-class-name: driver JDBC necesario para conectar con MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto: Hibernate gestiona el esquema de la base de datos
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql: imprime las consultas SQL en la consola de desarrollo
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql: formatea el SQL en múltiples líneas
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect: dialecto específico de MySQL para Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
