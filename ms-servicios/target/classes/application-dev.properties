# ms-servicios · application.properties | Puerto: 8086 | BD: db_hotel_servicios

# Activa el perfil de desarrollo para ejecutar el DataLoader al arrancar la aplicación
spring.profiles.active=dev

# spring.application.name: identifica el microservicio de servicios adicionales
spring.application.name=ms-servicios
# server.port: puerto HTTP del microservicio del catálogo de servicios
server.port=8086
# spring.datasource.url: URL JDBC de la base de datos del catálogo de servicios adicionales
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_servicios?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username: usuario MySQL con acceso a la base de datos de servicios
spring.datasource.username=root
# spring.datasource.password: contraseña del usuario MySQL
spring.datasource.password=
# spring.datasource.driver-class-name: driver JDBC oficial de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto: gestión automática del esquema de la base de datos
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql: muestra las consultas SQL generadas por Hibernate
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql: formatea el SQL para mejor legibilidad
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect: dialecto MySQL para generación de SQL correcto
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



// Configuración de SpringDoc para generar documentación OpenAPI y habilitar Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ── EUREKA CLIENT ─────────────────────────────────────────────
# Registra este microservicio en el servidor Eureka del hotel (puerto 8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/