# ms-empleados · application.properties | Puerto: 8089 | BD: db_hotel_empleados

# spring.application.name: nombre del microservicio de gestión de personal
spring.application.name=ms-empleados
# server.port: puerto HTTP exclusivo del microservicio de empleados
server.port=8089
# spring.datasource.url: URL de conexión JDBC a la base de datos de empleados del hotel
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_empleados?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username: usuario MySQL con acceso a db_hotel_empleados
spring.datasource.username=root
# spring.datasource.password: contraseña MySQL vacía por defecto en entorno de desarrollo
spring.datasource.password=
# spring.datasource.driver-class-name: clase del driver de conexión MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto: crea o actualiza el esquema de tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql: imprime las sentencias SQL en la consola
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql: formatea las sentencias SQL impresas
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect: dialecto MySQL para la generación de SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
