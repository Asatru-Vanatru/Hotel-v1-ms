# ═══════════════════════════════════════════════════════════════
# ms-habitaciones · application.properties
# Microservicio de Gestión de Habitaciones del Hotel
# Puerto: 8082 | Base de datos: db_hotel_habitaciones
# ═══════════════════════════════════════════════════════════════

# spring.application.name: nombre del microservicio en logs y monitoreo
spring.application.name=ms-habitaciones

# server.port: puerto donde Tomcat recibe peticiones HTTP de este microservicio
server.port=8082

# spring.datasource.url: cadena de conexión JDBC a la base de datos exclusiva de habitaciones
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_habitaciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

# spring.datasource.username: usuario de MySQL con acceso a db_hotel_habitaciones
spring.datasource.username=root

# spring.datasource.password: contraseña del usuario MySQL (vacía en instalaciones locales)
spring.datasource.password=

# spring.datasource.driver-class-name: driver JDBC oficial de MySQL para Java 8+
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# spring.jpa.hibernate.ddl-auto: Hibernate crea/actualiza tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

# spring.jpa.show-sql: muestra en consola las sentencias SQL ejecutadas por Hibernate
spring.jpa.show-sql=true

# spring.jpa.properties.hibernate.format_sql: formatea el SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# spring.jpa.properties.hibernate.dialect: indica a Hibernate el dialecto SQL de MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


// Configuración de SpringDoc para generar documentación OpenAPI y habilitar Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.htm