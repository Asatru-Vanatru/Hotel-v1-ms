server:
  port: 8080

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      # Desactiva ForwardedHeadersFilter para evitar conflictos de API en tiempo de ejecucion
      forwarded:
        enabled: false
      routes:
        # ── RUTAS API ─────────────────────────────────────────────────────────
        # lb:// indica que el gateway resuelve la instancia via Eureka + LoadBalancer

        - id: ms-clientes
          uri: lb://ms-clientes
          predicates:
            - Path=/api/clientes/**, /api/v2/clientes/**

        - id: ms-habitaciones
          uri: lb://ms-habitaciones
          predicates:
            - Path=/api/habitaciones/**

        - id: ms-reservas
          uri: lb://ms-reservas
          predicates:
            - Path=/api/reservas/**

        - id: ms-checkin
          uri: lb://ms-checkin
          predicates:
            - Path=/api/checkins/**, /api/v2/checkins/**

        - id: ms-checkout
          uri: lb://ms-checkout
          predicates:
            - Path=/api/checkouts/**, /api/v2/checkouts/**

        - id: ms-servicios
          uri: lb://ms-servicios
          predicates:
            - Path=/api/servicios/**, /api/v2/servicios/**

        - id: ms-consumos
          uri: lb://ms-consumos
          predicates:
            - Path=/api/consumos/**, /api/v2/consumos/**

        - id: ms-pagos
          uri: lb://ms-pagos
          predicates:
            - Path=/api/pagos/**

        - id: ms-empleados
          uri: lb://ms-empleados
          predicates:
            - Path=/api/empleados/**

        - id: ms-mantenimiento
          uri: lb://ms-mantenimiento
          predicates:
            - Path=/api/mantenimientos/**

        # ── RUTAS SWAGGER / OPENAPI ───────────────────────────────────────────
        # El gateway proxea los JSON de OpenAPI de cada microservicio
        # para que el Swagger UI unificado pueda mostrarlos todos

        - id: ms-clientes-docs
          uri: lb://ms-clientes
          predicates:
            - Path=/ms-clientes/v3/api-docs
          filters:
            - RewritePath=/ms-clientes/v3/api-docs, /v3/api-docs

        - id: ms-habitaciones-docs
          uri: lb://ms-habitaciones
          predicates:
            - Path=/ms-habitaciones/v3/api-docs
          filters:
            - RewritePath=/ms-habitaciones/v3/api-docs, /v3/api-docs

        - id: ms-reservas-docs
          uri: lb://ms-reservas
          predicates:
            - Path=/ms-reservas/v3/api-docs
          filters:
            - RewritePath=/ms-reservas/v3/api-docs, /v3/api-docs

        - id: ms-checkin-docs
          uri: lb://ms-checkin
          predicates:
            - Path=/ms-checkin/v3/api-docs
          filters:
            - RewritePath=/ms-checkin/v3/api-docs, /v3/api-docs

        - id: ms-checkout-docs
          uri: lb://ms-checkout
          predicates:
            - Path=/ms-checkout/v3/api-docs
          filters:
            - RewritePath=/ms-checkout/v3/api-docs, /v3/api-docs

        - id: ms-servicios-docs
          uri: lb://ms-servicios
          predicates:
            - Path=/ms-servicios/v3/api-docs
          filters:
            - RewritePath=/ms-servicios/v3/api-docs, /v3/api-docs

        - id: ms-consumos-docs
          uri: lb://ms-consumos
          predicates:
            - Path=/ms-consumos/v3/api-docs
          filters:
            - RewritePath=/ms-consumos/v3/api-docs, /v3/api-docs

        - id: ms-pagos-docs
          uri: lb://ms-pagos
          predicates:
            - Path=/ms-pagos/v3/api-docs
          filters:
            - RewritePath=/ms-pagos/v3/api-docs, /v3/api-docs

        - id: ms-empleados-docs
          uri: lb://ms-empleados
          predicates:
            - Path=/ms-empleados/v3/api-docs
          filters:
            - RewritePath=/ms-empleados/v3/api-docs, /v3/api-docs

        - id: ms-mantenimiento-docs
          uri: lb://ms-mantenimiento
          predicates:
            - Path=/ms-mantenimiento/v3/api-docs
          filters:
            - RewritePath=/ms-mantenimiento/v3/api-docs, /v3/api-docs

# Eureka: el gateway se registra y descubre microservicios del hotel
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# Actuator: expone endpoints de salud e info
management:
  endpoints:
    web:
      exposure:
        include: health,info

# SpringDoc: Swagger UI unificado con todos los microservicios del hotel
springdoc:
  swagger-ui:
    path: /doc/swagger-ui.html
    urls:
      - name: ms-clientes
        url: /ms-clientes/v3/api-docs
      - name: ms-habitaciones
        url: /ms-habitaciones/v3/api-docs
      - name: ms-reservas
        url: /ms-reservas/v3/api-docs
      - name: ms-checkin
        url: /ms-checkin/v3/api-docs
      - name: ms-checkout
        url: /ms-checkout/v3/api-docs
      - name: ms-servicios
        url: /ms-servicios/v3/api-docs
      - name: ms-consumos
        url: /ms-consumos/v3/api-docs
      - name: ms-pagos
        url: /ms-pagos/v3/api-docs
      - name: ms-empleados
        url: /ms-empleados/v3/api-docs
      - name: ms-mantenimiento
        url: /ms-mantenimiento/v3/api-docs
  api-docs:
    enabled: true
