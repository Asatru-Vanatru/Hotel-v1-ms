# ═══════════════════════════════════════════════════════════════
# ms-clientes · application.properties
# Microservicio de Gestión de Clientes y Huéspedes del Hotel
# Puerto: 8081 | Base de datos: db_hotel_clientes
# ═══════════════════════════════════════════════════════════════

spring.profiles.active=dev

# ── NOMBRE DE LA APLICACIÓN ──────────────────────────────────
# spring.application.name: identifica el microservicio en logs y herramientas de monitoreo
spring.application.name=ms-clientes

# ── PUERTO DEL SERVIDOR ───────────────────────────────────────
# server.port: puerto TCP donde Tomcat escucha las peticiones HTTP de este microservicio
server.port=8081

# ── CONEXIÓN A MYSQL ─────────────────────────────────────────
# spring.datasource.url: URL JDBC de conexión a MySQL
#   - localhost:3306 → servidor MySQL local en puerto por defecto
#   - db_hotel_clientes → base de datos exclusiva de este microservicio
#   - createDatabaseIfNotExist=true → crea la BD si no existe al arrancar
#   - useSSL=false → desactiva SSL para desarrollo local
#   - serverTimezone=UTC → establece zona horaria UTC para evitar errores de fecha
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_clientes?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

# spring.datasource.username: usuario de MySQL con permisos sobre db_hotel_clientes
spring.datasource.username=root

# spring.datasource.password: contraseña del usuario MySQL (vacía por defecto en XAMPP/Laragon)
spring.datasource.password=

# spring.datasource.driver-class-name: clase del driver JDBC de MySQL para Java
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── DDL AUTOMÁTICO ────────────────────────────────────────────
# spring.jpa.hibernate.ddl-auto=update: Hibernate crea las tablas si no existen
#   y las actualiza si el modelo cambió. Ideal para desarrollo.
spring.jpa.hibernate.ddl-auto=update

# ── MOSTRAR SQL EN CONSOLA ────────────────────────────────────
# spring.jpa.show-sql: imprime en consola el SQL que ejecuta Hibernate
spring.jpa.show-sql=true

# spring.jpa.properties.hibernate.format_sql: formatea el SQL para mejor legibilidad
spring.jpa.properties.hibernate.format_sql=true

# spring.jpa.properties.hibernate.dialect: dialecto de SQL para MySQL 8+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

// Configuración de SpringDoc para generar documentación OpenAPI y habilitar Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ── EUREKA CLIENT ─────────────────────────────────────────────
# Registra este microservicio en el servidor Eureka del hotel (puerto 8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
