# ms-pagos · application.properties | Puerto: 8088 | BD: db_hotel_pagos

# spring.application.name: nombre del microservicio de pagos y facturación
spring.application.name=ms-pagos
# server.port: puerto HTTP donde Tomcat atiende las solicitudes de pago
server.port=8088
# spring.datasource.url: URL JDBC de la base de datos exclusiva de pagos
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_pagos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username: usuario MySQL con permisos sobre db_hotel_pagos
spring.datasource.username=root
# spring.datasource.password: contraseña del usuario MySQL
spring.datasource.password=
# spring.datasource.driver-class-name: driver JDBC MySQL requerido para conectarse
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto: gestión automática del esquema de la base de datos
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql: muestra en consola las consultas SQL generadas
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql: formatea el SQL impreso en consola
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect: dialecto específico para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


// Configuración de SpringDoc para generar documentación OpenAPI y habilitar Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ── EUREKA CLIENT ─────────────────────────────────────────────
# Registra este microservicio en el servidor Eureka del hotel (puerto 8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/