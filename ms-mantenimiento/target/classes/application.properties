# ms-mantenimiento · application.properties | Puerto: 8090 | BD: db_hotel_mantenimiento

spring.profiles.active=dev

# spring.application.name: nombre del microservicio de solicitudes de mantenimiento
spring.application.name=ms-mantenimiento
# server.port: puerto HTTP donde atiende el microservicio de mantenimiento
server.port=8090
# spring.datasource.url: URL de conexión a la base de datos exclusiva de mantenimiento
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_mantenimiento?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username: usuario MySQL con acceso a db_hotel_mantenimiento
spring.datasource.username=root
# spring.datasource.password: contraseña MySQL por defecto vacía en XAMPP/Laragon
spring.datasource.password=
# spring.datasource.driver-class-name: driver JDBC para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto: crea y actualiza el esquema de tablas en desarrollo
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql: muestra las sentencias SQL ejecutadas por Hibernate
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql: formatea el SQL para facilitar su lectura
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect: dialecto MySQL para Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


// Configuración de SpringDoc para generar documentación OpenAPI y habilitar Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ── EUREKA CLIENT ─────────────────────────────────────────────
# Registra este microservicio en el servidor Eureka del hotel (puerto 8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/