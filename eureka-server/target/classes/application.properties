# ═══════════════════════════════════════════════════════════════
# eureka-server · application.properties
# Servidor de Registro y Descubrimiento de Servicios del Hotel
# Puerto: 8761
# ═══════════════════════════════════════════════════════════════

# ── NOMBRE DE LA APLICACIÓN ──────────────────────────────────
spring.application.name=eureka-server

# ── PUERTO DEL SERVIDOR ───────────────────────────────────────
# Puerto estándar de Eureka: 8761
server.port=8761

# ── CONFIGURACIÓN EUREKA SERVER ───────────────────────────────
# El servidor Eureka no debe registrarse a sí mismo como cliente
eureka.client.register-with-eureka=false
# El servidor no necesita obtener el registro de otros servidores Eureka
eureka.client.fetch-registry=false

# ── ACTUATOR ─────────────────────────────────────────────────
# Exponer endpoints de salud e info para monitoreo
management.endpoints.web.exposure.include=health,info
